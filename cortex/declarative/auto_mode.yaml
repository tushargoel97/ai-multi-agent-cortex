# Auto mode: per-intent model candidates, tried in order: the first model
# that is enabled in the registry (model + provider) wins. The keyword
# `finetuned` resolves to the newest enabled `finetuned-*` local model.
# `fast` is the utility tier (router classification, synthesizer, guardrails,
# thread titles). `image_generation` lists Google image-capable model ids
# used directly by the imagegen node (they are not registry chat models).
# Gemini chat models (gemini-3.5-flash / gemini-3-pro-preview) sit behind the
# Anthropic/OpenAI leads: the free-tier key allows only ~20 requests/day,
# which dies mid-conversation, so they serve as fallback capacity.

profiles:
  balanced:
    fast: [claude-haiku-4-5-20251001, gemini-3.5-flash, gpt-4o-mini, claude-sonnet-5]
    general_chat: [claude-haiku-4-5-20251001, gemini-3.5-flash, claude-sonnet-5]
    knowledge_query: [claude-sonnet-5, claude-opus-4-8, gemini-3-pro-preview, gpt-5.5-pro]
    reasoning_task: [claude-opus-4-8, gpt-5.5-pro, gemini-3-pro-preview, claude-sonnet-5]
    coding_task: [claude-sonnet-5, gpt-5.5-pro, claude-opus-4-8, gemini-3-pro-preview, claude-fable-5]
    engineer: [claude-fable-5, claude-opus-4-8, gpt-5.6-sol, claude-sonnet-5]
    # Haiku leads: shopping/booking is mostly deterministic link-building
    # (find_bookings / product_prices), Instant mode needs the speed.
    shopping: [claude-haiku-4-5-20251001, gemini-3.5-flash, claude-sonnet-5, gpt-5.5-pro]
    booking: [claude-haiku-4-5-20251001, gemini-3.5-flash, claude-sonnet-5, gpt-5.5-pro]
    prompt_caching: [claude-sonnet-5, claude-opus-4-8]
    product_specs: [finetuned]
    image_generation: [gemini-3-pro-image, gpt-image-2, gemini-3.1-flash-image, gpt-image-1.5, gpt-image-1-mini]

  quality:
    fast: [claude-sonnet-5, gemini-3.5-flash]
    general_chat: [claude-sonnet-5, claude-opus-4-8, gemini-3-pro-preview]
    knowledge_query: [claude-opus-4-8, gpt-5.5-pro, gemini-3-pro-preview, claude-sonnet-5]
    reasoning_task: [gpt-5.5-pro, claude-opus-4-8, gemini-3-pro-preview]
    coding_task: [claude-opus-4-8, gpt-5.5-pro, claude-fable-5, gemini-3-pro-preview, claude-sonnet-5]
    engineer: [claude-fable-5, claude-opus-4-8, gpt-5.6-sol, claude-sonnet-5]
    shopping: [claude-opus-4-8, claude-sonnet-5, gemini-3-pro-preview, gpt-5.5-pro]
    booking: [claude-opus-4-8, claude-sonnet-5, gemini-3-pro-preview, gpt-5.5-pro]
    prompt_caching: [claude-opus-4-8, claude-sonnet-5]
    product_specs: [finetuned]
    image_generation: [gpt-image-2, gemini-3-pro-image, gpt-image-1.5]

  cost:
    fast: [claude-haiku-4-5-20251001, gemini-3.5-flash]
    general_chat: [claude-haiku-4-5-20251001, gemini-3.5-flash]
    knowledge_query: [claude-haiku-4-5-20251001, gemini-3.5-flash, claude-sonnet-5]
    reasoning_task: [claude-sonnet-5, gemini-3.5-flash, claude-haiku-4-5-20251001]
    coding_task: [claude-sonnet-5, claude-fable-5, gemini-3-pro-preview, gpt-5.5-pro, claude-opus-4-8]
    engineer: [claude-fable-5, gpt-5.6-sol, claude-sonnet-5]
    shopping: [claude-haiku-4-5-20251001, gemini-3.5-flash, claude-sonnet-5]
    booking: [claude-haiku-4-5-20251001, gemini-3.5-flash, claude-sonnet-5]
    prompt_caching: [claude-sonnet-5]
    product_specs: [finetuned]
    image_generation: [gemini-2.5-flash-image, gpt-image-1-mini, gemini-3.1-flash-image]
